{% extends "base.html" %}
{% block title %}Cadastro — IPTV System{% endblock %}
{% block body %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">📺</div>
      <h1>IPTV System</h1>
      <p>Criar nova conta</p>
    </div>

    <div id="alert-box" class="alert hidden"></div>

    <form id="register-form" class="auth-form">
      <div class="form-group">
        <label for="username">Usuário *</label>
        <input type="text" id="username" name="username" placeholder="Mínimo 3 caracteres"
               autocomplete="username" required minlength="3" />
      </div>
      <div class="form-group">
        <label for="email">E-mail (opcional)</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com"
               autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Senha *</label>
        <div class="input-password">
          <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres"
                 autocomplete="new-password" required minlength="6" />
          <button type="button" class="toggle-password" onclick="togglePassword('password')">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label for="password2">Confirmar Senha *</label>
        <div class="input-password">
          <input type="password" id="password2" name="password2" placeholder="Repita a senha"
                 autocomplete="new-password" required />
          <button type="button" class="toggle-password" onclick="togglePassword('password2')">👁</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="register-btn">
        <span class="btn-text">Criar Conta</span>
        <span class="btn-loading hidden">Aguarde...</span>
      </button>
    </form>

    <div class="auth-footer">
      <p>Já tem conta? <a href="/login">Fazer login</a></p>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById("register-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("register-btn");
  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const password2 = document.getElementById("password2").value;

  if (password !== password2) {
    showAlert("As senhas não coincidem", "error");
    return;
  }

  setLoading(btn, true);
  hideAlert();

  try {
    const res = await fetch("/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, email, password }),
      credentials: "include"
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = "/dashboard";
    } else {
      showAlert(data.error || "Erro ao cadastrar", "error");
    }
  } catch (err) {
    showAlert("Erro de conexão. Tente novamente.", "error");
  } finally {
    setLoading(btn, false);
  }
});
</script>
{% endblock %}
