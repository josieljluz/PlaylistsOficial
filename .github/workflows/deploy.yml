name: Deploy IPTV System

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

  # ✅ Execução manual (botão "Run workflow")
  workflow_dispatch:

  # ✅ Execução automática (cron - UTC)
  schedule:
    # Todo dia às 7:30 da manhã (Brasília = UTC-3 → 10:30 UTC)
    - cron: "30 10 * * *"

jobs:
  test:
    name: Testes e Validação
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Verificar sintaxe Python
        run: python -m py_compile api/app.py api/models.py api/m3u_processor.py

      - name: Teste de inicialização da aplicação
        run: |
          python -c "
          import os
          os.environ['DB_PATH'] = '/tmp/test_iptv.db'
          os.environ['SECRET_KEY'] = 'test-secret-key'
          from api.app import app
          from api.models import init_db
          init_db()
          client = app.test_client()
          r = client.get('/api/health')
          assert r.status_code == 200, f'Health check failed: {r.status_code}'
          print('✅ Todos os testes passaram!')
          "

  sync-iptv:
    name: 🔄 Sincronização IPTV
    runs-on: ubuntu-latest

    # Executa quando:
    # - cron
    # - manual
    # - push (opcional)
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar script de sincronização IPTV
        run: |
          python scripts/sync_iptv.py

      - name: Commit e push automático
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .

          git commit -m "🔄 Atualização automática IPTV - $(date +'%Y-%m-%d %H:%M:%S')" || echo "Sem mudanças"

          git push

  deploy-render:
    name: 🚀 Deploy para Render
    runs-on: ubuntu-latest
    needs: [test, sync-iptv]

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Deploy no Render
        if: vars.RENDER_DEPLOY_HOOK != ''
        run: |
          curl -X POST "${{ vars.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail-with-body || echo "Deploy hook não configurado ou falhou"
