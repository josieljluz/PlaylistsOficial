name: Deploy IPTV System

# ✅ PERMISSÕES (ESSENCIAL PARA RESOLVER O ERRO 403)
permissions:
  contents: write

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

  # ✅ Execução manual
  workflow_dispatch:

  # ✅ Execução automática (cron UTC)
  schedule:
    - cron: "30 10 * * *"

jobs:
  test:
    name: Testes e Validação
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Verificar sintaxe Python
        run: python -m py_compile api/app.py api/models.py api/m3u_processor.py

      - name: Teste da API
        run: |
          python -c "
          import os
          os.environ['DB_PATH'] = '/tmp/test_iptv.db'
          os.environ['SECRET_KEY'] = 'test-secret-key'
          from api.app import app
          from api.models import init_db
          init_db()
          client = app.test_client()
          r = client.get('/api/health')
          assert r.status_code == 200
          print('✅ Testes OK')
          "

  sync-iptv:
    name: 🔄 Sincronização IPTV
    runs-on: ubuntu-latest

    # ✅ Evita loop infinito (push do bot não reexecuta)
    if: |
      github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar script IPTV
        run: python scripts/sync_iptv.py

      - name: Commit e Push automático (COM TOKEN)
        env:
          TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .

          git commit -m "🔄 Atualização automática IPTV - $(date +'%Y-%m-%d %H:%M:%S')" || exit 0

          git push https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git

  deploy-render:
    name: 🚀 Deploy para Render
    runs-on: ubuntu-latest
    needs: [test, sync-iptv]

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Deploy
        if: vars.RENDER_DEPLOY_HOOK != ''
        run: |
          curl -X POST "${{ vars.RENDER_DEPLOY_HOOK }}" \
          -H "Content-Type: application/json" \
          --fail-with-body || echo "Deploy falhou"
